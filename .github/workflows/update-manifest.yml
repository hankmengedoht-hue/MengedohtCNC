name: Update Product Manifest

on:
  push:
    paths:
      - '_data/products/**.json'

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Update manifest.json
        run: |
          cd _data/products
          ls *.json | grep -v manifest.json | sort | jq -R . | jq -s . > manifest.json
          cat manifest.json

      - name: Commit manifest
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add _data/products/manifest.json
          git diff --staged --quiet || git commit -m "Auto-update product manifest"
          git push
