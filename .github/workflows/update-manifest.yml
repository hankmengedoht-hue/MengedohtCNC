name: Rebuild Manifests

on:
  push:
    branches: [main]
    paths:
      - '_data/products/**'
      - '_data/reviews/**'
      - '_data/gallery/**'
      - '_data/shop-photos/**'
      - '_data/custom-parts-examples/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    # Don't run on the auto-commit itself
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild all manifests
        run: |
          python3 - <<'EOF'
          import json, os

          # Directories that use a manifest.json index
          # pages/ is excluded — it uses named files loaded directly by main.js
          manifest_dirs = [
            '_data/products',
            '_data/reviews',
            '_data/gallery',
            '_data/shop-photos',
            '_data/custom-parts-examples',
          ]

          for d in manifest_dirs:
            if not os.path.isdir(d):
              os.makedirs(d)
            files = sorted(
              f for f in os.listdir(d)
              if f.endswith('.json') and f != 'manifest.json'
            )
            manifest_path = os.path.join(d, 'manifest.json')
            with open(manifest_path, 'w') as fh:
              json.dump(files, fh, indent=2)
              fh.write('\n')
            print(f'{manifest_path}: {len(files)} entries')
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/products/manifest.json \
                  _data/reviews/manifest.json \
                  _data/gallery/manifest.json \
                  _data/shop-photos/manifest.json \
                  _data/custom-parts-examples/manifest.json
          if git diff --staged --quiet; then
            echo "All manifests already up to date."
          else
            git pull --no-rebase
            git commit -m "Auto-rebuild manifests [skip ci]"
            git push
          fi
