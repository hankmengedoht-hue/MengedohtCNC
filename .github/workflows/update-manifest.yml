name: Update Manifests

on:
  push:
    paths:
      - '_data/products/**.json'
      - '_data/gallery/**.json'
      - '_data/shop-photos/**.json'
      - '_data/reviews/**.json'
      - '_data/custom-parts-examples/**.json'

jobs:
  update-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Update product manifest
        run: |
          cd _data/products
          ls *.json | grep -v manifest.json | sort | jq -R . | jq -s . > manifest.json
          echo "Product manifest updated:"
          cat manifest.json

      - name: Sync product images to gallery
        run: |
          mkdir -p _data/gallery
          python3 << 'PYEOF'
          import os, json, re

          products_dir = '_data/products'
          gallery_dir = '_data/gallery'

          # Load all product files
          for fname in os.listdir(products_dir):
            if fname == 'manifest.json' or not fname.endswith('.json'):
              continue
            with open(os.path.join(products_dir, fname)) as f:
              try:
                product = json.load(f)
              except:
                continue

            product_slug = fname.replace('.json', '')
            images = []

            # Collect primary image
            if product.get('image'):
              images.append(product['image'])

            # Collect images array
            for img in product.get('images', []):
              src = img if isinstance(img, str) else img.get('image', '')
              if src and src not in images:
                images.append(src)

            # Create gallery entry for each image
            for i, img_src in enumerate(images):
              safe = re.sub(r'[^a-z0-9]+', '-', img_src.lower().split('/')[-1].split('.')[0])
              gallery_fname = f"product-{product_slug}-{i}.json"
              gallery_path = os.path.join(gallery_dir, gallery_fname)
              entry = {
                "image": img_src,
                "published": True,
                "_source": "product",
                "_product": product_slug
              }
              with open(gallery_path, 'w') as f:
                json.dump(entry, f, indent=2)

          print("Product images synced to gallery.")
          PYEOF

      - name: Update gallery manifest
        run: |
          cd _data/gallery
          if ls *.json 2>/dev/null | grep -v manifest.json > /dev/null 2>&1; then
            ls *.json | grep -v manifest.json | sort | jq -R . | jq -s . > manifest.json
          else
            echo "[]" > manifest.json
          fi
          echo "Gallery manifest updated:"
          cat manifest.json

      - name: Update shop photos manifest
        run: |
          cd _data/shop-photos
          if ls *.json 2>/dev/null | grep -v manifest.json > /dev/null 2>&1; then
            ls *.json | grep -v manifest.json | sort | jq -R . | jq -s . > manifest.json
          else
            echo "[]" > manifest.json
          fi
          echo "Shop photos manifest updated:"
          cat manifest.json

      - name: Update reviews manifest
        run: |
          if ls _data/reviews/*.json 2>/dev/null | grep -v manifest.json > /dev/null 2>&1; then
            cd _data/reviews
            ls *.json | grep -v manifest.json | sort | jq -R . | jq -s . > manifest.json
            echo "Reviews manifest updated:"
            cat manifest.json
          fi

      - name: Update custom-parts-examples manifest
        run: |
          mkdir -p _data/custom-parts-examples
          if ls _data/custom-parts-examples/*.json 2>/dev/null | grep -v manifest.json > /dev/null 2>&1; then
            cd _data/custom-parts-examples
            ls *.json | grep -v manifest.json | sort | jq -R . | jq -s . > manifest.json
          else
            echo "[]" > _data/custom-parts-examples/manifest.json
          fi
          echo "Custom parts examples manifest updated:"
          cat _data/custom-parts-examples/manifest.json

      - name: Commit manifests
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add _data/products/manifest.json _data/gallery/ _data/shop-photos/manifest.json _data/reviews/manifest.json _data/custom-parts-examples/manifest.json
          git diff --staged --quiet || git commit -m "Auto-update manifests and sync product images to gallery"
          git pull --rebase
          git push
