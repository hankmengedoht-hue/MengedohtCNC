backend:
  name: github
  repo: hankmengedoht-hue/MengedohtCNC
  branch: main
  base_url: https://cms-auth.hankmengedoht.workers.dev
  squash_merges: true
  commit_messages:
    create: 'Create {{collection}} "{{slug}}"'
    update: 'Update {{collection}} "{{slug}}"'
    delete: 'Delete {{collection}} "{{slug}}"'
    uploadMedia: 'Upload "{{path}}"'
    deleteMedia: 'Delete "{{path}}"'

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:

  # ─────────────────────────────────────────
  # PRODUCTS
  # ─────────────────────────────────────────
  - name: "products"
    label: "Products"
    label_singular: "Product"
    folder: "_data/products"
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "{{title}} — {{category}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "Product Name", name: "title", widget: "string" }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Tool Organizers", value: "tools" }
          - { label: "Marine", value: "marine" }
          - { label: "Shelving / Storage", value: "pegboard" }
          - { label: "Automotive Dashboards", value: "automotive" }
          - { label: "Custom / Other", value: "custom" }
      - { label: "Material", name: "material", widget: "string", hint: "e.g. HDPE, Baltic Birch Plywood, Carbon Fiber" }
      - { label: "Short Description", name: "description", widget: "text" }
      - label: "Full Story / Inspiration"
        name: "story"
        widget: "text"
        required: false
        hint: "A longer description — the inspiration, use case, and story behind this product."
      - label: "Product Images"
        name: "images"
        widget: "list"
        required: false
        hint: "Add multiple photos. First image is shown on the product card."
        field: { label: "Image", name: "image", widget: "image" }
      - { label: "Primary Image (card thumbnail)", name: "image", widget: "image", required: false, hint: "Used on product cards and featured grids." }
      - label: "Approximate Weight"
        name: "weight"
        widget: "string"
        required: false
        hint: "e.g. 1.2 lbs, 450g"
      - label: "Available for Retail (Individual Sales)"
        name: "retail_available"
        widget: "boolean"
        default: false
        hint: "Turn ON if individuals can buy single units."
      - label: "Retail Price"
        name: "retail_price"
        widget: "string"
        required: false
        hint: "e.g. $34.99 — displayed on the product page"
      - label: "Stripe Payment Link"
        name: "stripe_link"
        widget: "string"
        required: false
        hint: "Paste your Stripe payment link here e.g. https://buy.stripe.com/xxxx"
      - label: "Available for Wholesale"
        name: "wholesale_available"
        widget: "boolean"
        default: true
      - label: "Fits / Compatible With"
        name: "fits"
        widget: "string"
        required: false
        hint: "e.g. Fits 15-17ft Boston Whaler CC"
      - label: "Featured Product"
        name: "featured"
        widget: "boolean"
        default: false
        hint: "Featured products appear first with a highlighted border"
      - label: "Published"
        name: "published"
        widget: "boolean"
        default: true
        hint: "Unpublish to hide without deleting"
      - label: "Sort Order"
        name: "order"
        widget: "number"
        default: 99
        hint: "Lower numbers appear first"

  # ─────────────────────────────────────────
  # PAGE CONTENT
  # ─────────────────────────────────────────
  - name: "pages"
    label: "Page Content"
    files:

      - label: "Homepage"
        name: "home"
        file: "_data/pages/home.json"
        fields:
          - { label: "Hero Headline", name: "hero_headline", widget: "string" }
          - { label: "Hero Subheadline", name: "hero_sub", widget: "text" }
          - { label: "Hero CTA Button Text", name: "hero_cta", widget: "string" }
          - { label: "Stat 1 Number", name: "stat1_num", widget: "string" }
          - { label: "Stat 1 Label", name: "stat1_label", widget: "string" }
          - { label: "Stat 2 Number", name: "stat2_num", widget: "string" }
          - { label: "Stat 2 Label", name: "stat2_label", widget: "string" }
          - { label: "Stat 3 Number", name: "stat3_num", widget: "string" }
          - { label: "Stat 3 Label", name: "stat3_label", widget: "string" }
          - { label: "Bottom CTA Headline", name: "cta_headline", widget: "string" }
          - { label: "Bottom CTA Subtext", name: "cta_sub", widget: "string" }
          - { label: "Hero Photo", name: "hero_image", widget: "image", required: false, hint: "Shown to the right of the hero headline on the home page. Replaces the animated graphic." }
          

      - label: "Wholesale Page"
        name: "wholesale"
        file: "_data/pages/wholesale.json"
        fields:
          - { label: "Page Headline", name: "headline", widget: "string" }
          - { label: "Page Subtext", name: "sub", widget: "text" }
          - { label: "MOQ Details", name: "moq_details", widget: "text" }
          - { label: "Lead Time Details", name: "lead_time", widget: "text" }
          - { label: "Payment Terms", name: "payment_terms", widget: "text" }
          - { label: "Shipping Info", name: "shipping", widget: "text" }

      - label: "Retail Page"
        name: "retail"
        file: "_data/pages/retail.json"
        fields:
          - { label: "Page Headline", name: "headline", widget: "string" }
          - { label: "Page Subtext", name: "sub", widget: "text" }
          - { label: "Shipping Info", name: "shipping", widget: "text" }
          - { label: "Return Policy", name: "returns", widget: "text" }

      - label: "Site Settings"
        name: "settings"
        file: "_data/pages/settings.json"
        fields:
          - { label: "Business Name", name: "business_name", widget: "string" }
          - { label: "Contact Email", name: "email", widget: "string" }
          - { label: "Footer Tagline", name: "footer_tagline", widget: "text" }
          - label: "Materials List"
            name: "materials"
            widget: "list"
            hint: "Add or remove materials shown in the homepage bar"
            field: { label: "Material", name: "material", widget: "string" }

  # ─────────────────────────────────────────
  # GALLERY
  # ─────────────────────────────────────────
  - name: "gallery"
    label: "Gallery"
    label_singular: "Photo"
    folder: "_data/gallery"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "Photo", name: "image", widget: "image" }
      - { label: "Title / Caption", name: "title", widget: "string", required: false, hint: "Optional short caption shown on hover." }
      - label: "Categories"
        name: "categories"
        widget: "select"
        multiple: true
        required: false
        hint: "Select all that apply. A marine carbon fiber panel can be both Marine and Carbon Fiber / G10."
        options:
          - { label: "Marine", value: "marine" }
          - { label: "Woodwork", value: "woodwork" }
          - { label: "Furniture", value: "furniture" }
          - { label: "Signage", value: "signage" }
          - { label: "Automotive", value: "automotive" }
          - { label: "Art", value: "art" }
          - { label: "Carbon Fiber / G10", value: "carbon" }
          - { label: "Flat-Pack Plywood", value: "flatpack" }
          - { label: "Custom / Other", value: "custom" }
      - { label: "Published", name: "published", widget: "boolean", default: true }
      - { label: "Feature on Custom Parts Page", name: "custom_parts_featured", widget: "boolean", default: false, hint: "Show this photo in the Recent Work section on the Custom Parts page." }

  # ─────────────────────────────────────────
  # CUSTOM PARTS EXAMPLES
  # ─────────────────────────────────────────
  - name: "custom-parts-examples"
    label: "Custom Parts Examples"
    label_singular: "Example Photo"
    folder: "_data/custom-parts-examples"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    summary: "{{image}}"
    fields:
      - { label: "Photo", name: "image", widget: "image", hint: "Shown in the 'Recent Work' section on the Custom Parts page." }
      - { label: "Caption", name: "caption", widget: "string", required: false, hint: "Optional short label shown on hover." }
      - { label: "Published", name: "published", widget: "boolean", default: true }

  # ─────────────────────────────────────────
  # SHOP PHOTOS
  # ─────────────────────────────────────────
  - name: "shop-photos"
    label: "Shop Photos"
    label_singular: "Shop Photo"
    folder: "_data/shop-photos"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "Photo", name: "image", widget: "image" }
      - { label: "Published", name: "published", widget: "boolean", default: true }

  # ─────────────────────────────────────────
  # REVIEWS
  # ─────────────────────────────────────────
  - name: "reviews"
    label: "Reviews"
    label_singular: "Review"
    folder: "_data/reviews"
    create: true
    delete: true
    identifier_field: "name"
    extension: "json"
    format: "json"
    summary: "{{name}} — {{rating}} stars"
    fields:
      - { label: "Reviewer Name", name: "name", widget: "string" }
      - { label: "Title / Location", name: "title", widget: "string", required: false, hint: "e.g. Hardware Store Owner, Ohio" }
      - label: "Star Rating"
        name: "rating"
        widget: "select"
        options:
          - { label: "★★★★★  5 stars", value: 5 }
          - { label: "★★★★  4 stars", value: 4 }
          - { label: "★★★  3 stars", value: 3 }
          - { label: "★★  2 stars", value: 2 }
          - { label: "★  1 star", value: 1 }
        default: 5
      - { label: "Review", name: "body", widget: "text" }
      - { label: "Photo", name: "image", widget: "image", required: false, hint: "Optional photo submitted with the review." }
      - { label: "Show on Home Page", name: "publish_home", widget: "boolean", default: false, hint: "Show this review in the 'What Buyers Say' section on the home page." }
      - { label: "Show on Contact Page", name: "publish_contact", widget: "boolean", default: false, hint: "Show this review in the reviews section on the contact page." }
      - { label: "Show on Wholesale Page", name: "publish_wholesale", widget: "boolean", default: false, hint: "Show this review in the reviews section on the wholesale page." }
      - { label: "Date", name: "date", widget: "string", required: false }

  # ─────────────────────────────────────────
  # FOUNDER PHOTO
  # ─────────────────────────────────────────
  - name: "founder"
    label: "Founder Photo"
    files:
      - label: "Founder Photo"
        name: "founder-photo"
        file: "_data/founder.json"
        fields:
          - { label: "Photo", name: "image", widget: "image", hint: "Upload your profile/founder photo. Recommended: square or 4:3 ratio." }

  # ─────────────────────────────────────────
  # CATEGORY IMAGES
  # ─────────────────────────────────────────
  - name: "category-images"
    label: "Category Images"
    files:
      - label: "Category Images"
        name: "category-images"
        file: "_data/pages/category-images.json"
        fields:
          - { label: "Custom & Prototyping Image", name: "custom", widget: "image", required: false }
          - { label: "Tool Organizers Image", name: "tools", widget: "image", required: false }
          - { label: "Marine Products Image", name: "marine", widget: "image", required: false }
          - { label: "Shelving / Storage Image", name: "shelving", widget: "image", required: false }
